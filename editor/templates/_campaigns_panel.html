  <div id="projects-header">
    <h1>Campaigns</h1>
    <nav id="nav-links">
      <a href="/">Editor</a>
      <a href="/library">Clip Library</a>
      <a href="/projects" class="active">Campaigns</a>
    </nav>
    <span id="cmp-count"></span>
    <button id="new-project-btn">New campaign</button>
  </div>

  <div id="projects-grid"></div>

  <div id="empty" class="hidden">
    No campaigns yet. Create one to group clips around a theme (e.g. a Holiday
    campaign, or Gardening) and give it context the AI can use when assembling edits.
  </div>

  <!-- Create / edit dialog -->
  <div id="project-overlay" class="hidden">
    <div id="project-card">
      <button id="project-close">&times;</button>
      <h2 id="project-dialog-title">New campaign</h2>
      <label class="fld">
        <span>Name</span>
        <input id="project-name" type="text" placeholder="e.g. Holiday campaign, Gardening series">
      </label>
      <label class="fld">
        <span>What is this campaign about?</span>
        <textarea id="project-description" rows="5"
          placeholder="Describe the campaign — subject, angle, tone, target audience. This context is saved and used to help assemble edits."></textarea>
      </label>
      <div id="project-dialog-actions">
        <button id="project-save">Create</button>
        <button id="project-cancel" class="secondary">Cancel</button>
      </div>
      <div id="project-error"></div>
    </div>
  </div>

  <!-- Campaign detail drawer (right side): things + chat -->
  <div id="drawer-scrim" class="hidden"></div>
  <aside id="campaign-drawer" class="hidden">
    <div id="drawer-head">
      <div>
        <div id="drawer-title"></div>
        <div id="drawer-desc"></div>
      </div>
      <button id="drawer-close" title="Close">&times;</button>
    </div>

    <section id="drawer-things">
      <h3>Important things
        <span class="section-hint">watched for when indexing footage</span>
      </h3>
      <ul id="cmp-things-list"></ul>
      <form id="cmp-thing-add-form">
        <input id="thing-add-name" placeholder="Add a thing (e.g. pipevine)" autocomplete="off">
        <button type="submit">Add</button>
      </form>
    </section>

    <section id="drawer-chat">
      <h3>Chat about this campaign</h3>
      <div id="chat-log"></div>
      <form id="cmp-chat-form">
        <textarea id="cmp-chat-input" rows="2"
          placeholder="Ask about this campaign, brainstorm ideas, or what to shoot next…"></textarea>
        <button type="submit" id="cmp-chat-send">Send</button>
      </form>
    </section>
  </aside>
