<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Content Studio</title>
  <link rel="stylesheet" href="/static/workspace.css">
</head>
<body>
  <div id="workspace">
    <!-- Left icon rail: the persistent app switcher. Click to open/close a panel. -->
    <nav id="rail">
      <button class="rail-btn" data-panel="library" title="Clip Library">
        <span class="rail-icon">🎞️</span><span class="rail-label">Library</span>
      </button>
      <button class="rail-btn" data-panel="editor" title="Editor">
        <span class="rail-icon">🎬</span><span class="rail-label">Editor</span>
      </button>
      <button class="rail-btn" data-panel="campaigns" title="Campaigns">
        <span class="rail-icon">📁</span><span class="rail-label">Campaigns</span>
      </button>
    </nav>

    <!-- Panels live here, left→right, with drag handles between them. -->
    <div id="panes"></div>

    <div id="panes-empty" class="hidden">
      <p>No panels open.</p>
      <p class="muted">Use the icons on the left to open the Editor, Clip Library, or Campaigns.</p>
    </div>
  </div>

  <script src="/static/workspace.js"></script>
</body>
</html>
