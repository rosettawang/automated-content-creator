<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Editor</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="layout">
    <div class="panel" id="library">
      <h2>Clip Library</h2>
      <input id="search" placeholder="search description / category / filename">
      <div id="clip-list"></div>
      <h2>Content Ideas</h2>
      <button id="suggest-content-btn">Suggest content ideas</button>
      <div id="content-ideas"></div>
    </div>

    <div class="panel" id="timeline-panel">
      <h2>Timeline</h2>
      <div>
        <select id="project-select"></select>
        <button id="new-project">New project</button>
      </div>
      <textarea id="generate-prompt" placeholder="Describe the video you want, e.g. '30s reel about the butterfly lifecycle'" rows="3"></textarea>
      <button id="generate-btn">Generate rough cut</button>
      <div id="generate-result"></div>
      <div id="timeline-list"></div>
      <button id="export-btn">Export</button>
      <div id="export-result"></div>
    </div>

    <div class="panel" id="preview-panel">
      <h2>Preview</h2>
      <video id="preview" controls></video>
      <div id="preview-info"></div>
      <div id="trim-controls" style="display:none">
        <label>In: <input id="in-point" type="number" step="0.1"></label>
        <label>Out: <input id="out-point" type="number" step="0.1"></label>
        <button id="add-to-timeline">Add to timeline</button>
        <button id="transcribe-btn">Transcribe</button>
      </div>
      <div id="transcript-box"></div>
    </div>
  </div>
  <script src="/static/app.js"></script>
</body>
</html>
