<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Editor</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div id="toolbar">
    <select id="project-select" title="Project"></select>
    <button id="new-project">New</button>
    <input id="generate-prompt" placeholder="Describe the video you want, then Generate…">
    <button id="generate-btn">Generate</button>
    <span id="generate-result" class="status"></span>
    <div class="spacer"></div>
    <button id="export-btn">Export</button>
    <span id="export-result" class="status"></span>
  </div>

  <div id="stage">
    <div id="source-panel" class="panel">
      <div class="panel-head">Source</div>
      <input id="search" placeholder="search clips">
      <div id="clip-list"></div>

      <div id="source-monitor">
        <video id="source-video" controls></video>
        <div id="source-info" class="muted"></div>
        <div id="source-controls" style="display:none">
          <label>In <input id="in-point" type="number" step="0.1"></label>
          <label>Out <input id="out-point" type="number" step="0.1"></label>
          <button id="set-in">[</button>
          <button id="set-out">]</button>
          <button id="add-to-timeline">Add ▸</button>
        </div>
        <div id="source-tools" style="display:none">
          <button id="transcribe-btn">Transcribe</button>
          <button id="analyze-btn">Analyze frame</button>
        </div>
        <div id="transcript-box" class="muted"></div>
        <div id="analysis-box" class="muted"></div>
      </div>

      <details id="tools">
        <summary>Tools</summary>
        <div class="tools-body">
          <div class="tool-label">Import from Drive</div>
          <textarea id="drive-links" placeholder="Google Drive share link(s), one per line" rows="2"></textarea>
          <button id="drive-import-btn">Import</button>
          <div id="drive-import-result" class="muted"></div>
          <div class="tool-label">Content ideas</div>
          <button id="suggest-content-btn">Suggest content ideas</button>
          <div id="content-ideas" class="muted"></div>
        </div>
      </details>
    </div>

    <div id="program-panel" class="panel">
      <div class="panel-head">Program</div>
      <div id="program-monitor">
        <video id="program-video"></video>
      </div>
      <div id="transport">
        <button id="jump-start" title="Jump to start">⏮</button>
        <button id="step-back" title="Previous clip">◂</button>
        <button id="play-pause" title="Play / pause (space)">▶</button>
        <button id="step-fwd" title="Next clip">▸</button>
        <button id="jump-end" title="Jump to end">⏭</button>
        <span id="time-readout" class="time">0:00.0 / 0:00.0</span>
      </div>
    </div>
  </div>

  <div id="timeline-region">
    <div id="timeline-toolbar">
      <span class="panel-head">Timeline</span>
      <button id="zoom-out" title="Zoom out">−</button>
      <button id="zoom-in" title="Zoom in">+</button>
      <span id="timeline-hint" class="muted">drag a clip to reorder · drag its edges to trim · Del removes · Space plays</span>
    </div>
    <div id="timeline-scroll">
      <div id="ruler"></div>
      <div id="track">
        <div id="playhead"></div>
      </div>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
